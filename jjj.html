<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok - Log In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }
        
        .login-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 40px 32px;
            width: 100%;
            transition: box-shadow 0.3s ease;
        }
        
        @media (min-width: 768px) {
            .login-card {
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
                padding: 48px 40px;
            }
        }
        /* Logo */
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo svg {
            width: 40px;
            height: 40px;
        }
        
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #111;
            margin-top: 12px;
            letter-spacing: -0.3px;
        }
        /* Tabs */
        
        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 28px;
            gap: 0;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 15px;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s ease;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            user-select: none;
        }
        
        .tab.active {
            color: #111;
            border-bottom-color: #111;
        }
        
        .tab:hover:not(.active) {
            color: #555;
        }
        /* Form */
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: #fafafa;
            transition: all 0.2s ease;
            color: #111;
        }
        
        .input-wrapper input:focus {
            border-color: #111;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.04);
        }
        
        .input-wrapper input::placeholder {
            color: #aaa;
        }
        
        .input-wrapper .toggle-pw {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: #777;
            font-size: 13px;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.15s;
        }
        
        .input-wrapper .toggle-pw:hover {
            background: #f0f0f0;
        }
        /* Extra row */
        
        .extra-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 24px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
        }
        
        .remember input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #111;
            cursor: pointer;
        }
        
        .forgot-link {
            font-size: 14px;
            color: #555;
            text-decoration: none;
            font-weight: 500;
        }
        
        .forgot-link:hover {
            color: #111;
        }
        /* Buttons */
        
        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: #111;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }
        
        .btn-login:hover {
            background: #333;
        }
        
        .btn-login:active {
            transform: scale(0.98);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        /* Divider */
        
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 12px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
        }
        /* Social buttons */
        
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            background: #fff;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        
        .social-btn:hover {
            background: #fafafa;
            border-color: #bbb;
        }
        
        .social-btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        /* Signup link */
        
        .signup-text {
            text-align: center;
            font-size: 14px;
            color: #777;
        }
        
        .signup-text a {
            color: #111;
            font-weight: 600;
            text-decoration: none;
        }
        
        .signup-text a:hover {
            text-decoration: underline;
        }
        /* Error message */
        
        .error-msg {
            background: #fff0f0;
            border: 1px solid #ffd0d0;
            color: #c00;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        /* Footer */
        
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
        
        .footer a {
            color: #888;
            text-decoration: none;
            margin: 0 6px;
        }
        
        .footer a:hover {
            color: #555;
        }
        /* Loading spinner */
        
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        /* Toast */
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111;
            color: #fff;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        /* Responsive tweaks */
        
        @media (max-width: 480px) {
            .login-card {
                border: none;
                padding: 24px 20px;
                border-radius: 0;
            }
            .logo h1 {
                font-size: 20px;
            }
            .tab {
                font-size: 14px;
                padding: 10px 0;
            }
            .input-wrapper input {
                padding: 12px 14px;
                font-size: 14px;
            }
            .btn-login {
                padding: 13px;
                font-size: 15px;
            }
            .social-btn {
                padding: 10px;
                font-size: 13px;
            }
        }
        
        @media (max-width: 360px) {
            .login-card {
                padding: 16px 14px;
            }
            .extra-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
        
        @media (min-width: 1024px) {
            .login-card {
                padding: 56px 48px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="#111" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.589 6.686a4.793 4.793 0 0 1-3.77-4.245V2h-3.445v13.672a2.896 2.896 0 0 1-5.201 1.743l-.002-.001a2.895 2.895 0 0 1 3.183-4.51v-3.5a6.329 6.329 0 0 0-5.394 10.692 6.33 6.33 0 0 0 10.857-4.052V9.687a8.182 8.182 0 0 0 4.773 1.526V7.788a4.78 4.78 0 0 1-1.001-1.102z"/>
                </svg>
                <h1>TikTok</h1>
            </div>

            <!-- Tabs -->
            <div class="tabs" role="tablist">
                <button class="tab active" data-tab="login" role="tab" aria-selected="true">Log In</button>
                <button class="tab" data-tab="phone" role="tab" aria-selected="false">Use phone / email</button>
            </div>

            <!-- Error message -->
            <div class="error-msg" id="errorMsg"></div>

            <!-- Form -->
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">Email or username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Email or username" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                        <button type="button" class="toggle-pw" id="togglePw">Show</button>
                    </div>
                </div>

                <div class="extra-row">
                    <label class="remember">
                        <input type="checkbox" checked> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">Log In</button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>Or continue with</span>
            </div>

            <!-- Social -->
            <div class="social-buttons">
                <button class="social-btn" id="googleBtn">
                    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Continue with Google
                </button>
                <button class="social-btn" id="appleBtn">
                    <svg viewBox="0 0 24 24" fill="#111"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                    Continue with Apple
                </button>
            </div>

            <!-- Sign up -->
            <p class="signup-text">
                Don't have an account? <a href="#">Sign up</a>
            </p>
        </div>

        <div class="footer">
            <a href="#">Privacy Policy</a> ·
            <a href="#">Terms of Service</a> ·
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Toast notification (demo only) -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // DOM refs
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const togglePwBtn = document.getElementById('togglePw');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const toast = document.getElementById('toast');
            const tabs = document.querySelectorAll('.tab');

            // ---------- Tab switching (UI only) ----------
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    tabs.forEach(t => {
                        t.classList.remove('active');
                        t.setAttribute('aria-selected', 'false');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-selected', 'true');

                    // Clear error on tab switch
                    hideError();
                });
            });

            // ---------- Show / hide password ----------
            togglePwBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type');
                if (type === 'password') {
                    passwordInput.setAttribute('type', 'text');
                    this.textContent = 'Hide';
                } else {
                    passwordInput.setAttribute('type', 'password');
                    this.textContent = 'Show';
                }
            });

            // ---------- Error helpers ----------
            function showError(message) {
                errorMsg.textContent = message;
                errorMsg.classList.add('show');
            }

            function hideError() {
                errorMsg.textContent = '';
                errorMsg.classList.remove('show');
            }

            // ---------- Toast ----------
            let toastTimer = null;

            function showToast(message) {
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3500);
            }

            // ---------- Form submission (demo) ----------
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                hideError();

                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                // Simple client-side validation
                if (!username) {
                    showError('Please enter your email or username.');
                    usernameInput.focus();
                    return;
                }

                if (!password) {
                    showError('Please enter your password.');
                    passwordInput.focus();
                    return;
                }

                if (password.length < 4) {
                    showError('Incorrect password. Please try again.');
                    passwordInput.focus();
                    return;
                }

                // Simulate loading
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';

                setTimeout(() => {
                    // Demo: always "succeed" with a toast
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Log In';
                    showToast('Demo login successful! (No data is sent anywhere.)');
                    form.reset();
                }, 1500);
            });

            // ---------- Social button demos ----------
            document.getElementById('googleBtn').addEventListener('click', function() {
                showToast('Google login demo — no action taken.');
            });

            document.getElementById('appleBtn').addEventListener('click', function() {
                showToast('Apple login demo — no action taken.');
            });

            // ---------- Forgot password link ----------
            document.querySelector('.forgot-link').addEventListener('click', function(e) {
                e.preventDefault();
                showToast('Password reset page (demo placeholder).');
            });

            // ---------- Sign up link ----------
            document.querySelector('.signup-text a').addEventListener('click', function(e) {
                e.preventDefault();
                showToast('Sign up page (demo placeholder).');
            });

        })();
    </script>
</body>

</html>
